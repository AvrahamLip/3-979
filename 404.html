<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA redirect:
        // Converts the path into a hash-based URL so React HashRouter can handle it.
        var path = window.location.pathname;
        var repo = '/3-979';
        if (path.startsWith(repo)) {
            path = path.slice(repo.length);
        }
        window.location.replace(repo + '/#' + (path || '/'));
    </script>
</head>

<body>
    <p>Redirecting...</p>
</body>

</html>
