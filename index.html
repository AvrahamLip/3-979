<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דוח נוכחות - Doch!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    <div class="app-container">
        <header class="main-header">
            <div class="header-content">
                <h1>דוח נוכחות יומי</h1>
                <div class="date-selector-wrapper">
                    <label for="date-picker">בחר תאריך:</label>
                    <input type="date" id="date-picker" class="glass-input">
                </div>
            </div>
        </header>

        <main class="content-area">
            <section id="summary-section" class="summary-grid">
                <!-- Summary cards will be injected here -->
                <div class="placeholder-msg">בחר תאריך כדי להציג את הדוח</div>
            </section>

            <section id="details-section" class="details-list glass-card hidden">
                <h2>פירוט שמי</h2>
                <div class="table-wrapper">
                    <table id="details-table">
                        <thead>
                            <tr>
                                <th>שם</th>
                                <th>מחלקה</th>
                                <th>תפקיד</th>
                                <th>סטטוס (todayValue)</th>
                            </tr>
                        </thead>
                        <tbody id="details-body">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer class="main-footer">
            <p>&copy; 2026 מערכת Doch!</p>
        </footer>
    </div>
    
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
