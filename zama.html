<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דוח נוכחות - צמ"ה</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-glow"></div>
    <div class="app-container">
        <header class="main-header">
            <div class="header-content">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <a href="/3-979/" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-weight: bold;">
                        <div style="width: 2.5rem; height: 2.5rem; background: var(--accent-color); color: white; display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; font-size: 1.2rem;">ד!</div>
                        <span>דוח-1</span>
                    </a>
                    <h1>דוח נוכחות - צמ"ה</h1>
                </div>
                <div class="date-selector-wrapper">
                    <button id="pwa-install-btn" class="theme-btn hidden" style="font-size: 0.8rem; font-weight: 800; padding: 0.5rem 1rem;">התקינו אפליקציה ⬇️</button>
                    <label for="date-picker">תאריך:</label>
                    <input type="date" id="date-picker" class="glass-input">
                    <button id="theme-toggle" class="theme-btn" title="החלף מצב תצוגה">🌙</button>
                </div>
            </div>
        </header>


        <main class="content-area">
            <div id="departments-container">
                <!-- Each department section will be injected here -->
                <div class="placeholder-msg">בחר תאריך כדי להציג את הדוח</div>
            </div>
        </main>

        <footer class="main-footer">
            <p>&copy; 2026 מערכת Doch1</p>
        </footer>
    </div>

    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script type="module" src="./zama.js"></script>
</body>

</html>
